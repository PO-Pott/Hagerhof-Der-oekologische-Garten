<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Gartenkalender</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <h1>Gartenkalender</h1>

    <p>Hier siehst du, wann im ökologischen Garten welche Arbeiten anstehen.</p>

    <div class="calendar">

        <div class="month">
            <h2>März</h2>
            <p>Saat vorbereiten, erste Pflanzen ziehen</p>
        </div>

        <div class="month">
            <h2>April</h2>
            <p>Tomaten und Salat pflanzen</p>
        </div>

        <div class="month">
            <h2>Mai</h2>
            <p>Regelmäßig gießen und pflegen</p>
        </div>

    </div>
</body>
</html>
